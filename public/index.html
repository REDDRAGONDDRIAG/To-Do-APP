<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do Application with Calendar</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.8/main.min.css" rel="stylesheet" />

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.8/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid@6.1.8/main.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { db, auth, googleAuthProvider } from './Config.js';

    let currentUser = null;
    let calendar;

    async function signIn() {
      try {
        const result = await signInWithPopup(auth, googleAuthProvider);
        currentUser = result.user;
        console.log("Signed in as:", currentUser.displayName);
        fetchTasks();
      } catch (error) {
        console.error("Authentication failed:", error);
      }
    }

    const taskInput = document.getElementById('taskInput');
    const prioritySelect = document.getElementById('prioritySelect');
    const taskDate = document.getElementById('taskDate');
    const taskList = document.getElementById('taskList');

    const tasksCollection = collection(db, "tasks");

    async function addTask() {
      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const taskText = taskInput.value.trim();
      const taskPriority = parseInt(prioritySelect.value);
      const taskDueDate = taskDate.value;

      if (!taskText) return alert('Please enter a task.');
      if (!taskDueDate) return alert('Please select a date.');

      try {
        await addDoc(tasksCollection, {
          text: taskText,
          priority: taskPriority,
          dueDate: taskDueDate,
          userId: currentUser.uid
        });
        taskInput.value = '';
        taskDate.value = '';
        fetchTasks();
      } catch (error) {
        console.error("Error adding task:", error);
      }
    }

    async function deleteTask(id) {
      try {
        await deleteDoc(doc(db, "tasks", id));
        fetchTasks();
      } catch (error) {
        console.error("Error deleting task:", error);
      }
    }

    async function fetchTasks() {
      taskList.innerHTML = '';
      const querySnapshot = await getDocs(tasksCollection);
      const tasks = [];

      querySnapshot.forEach(doc => {
        const data = doc.data();
        if (data.userId === currentUser?.uid) {
          tasks.push({ id: doc.id, ...data });
        }
      });

      tasks.sort((a, b) => {
        if (a.dueDate === b.dueDate) return a.priority - b.priority;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `priority-p${task.priority}`;
        li.innerHTML = `
          ${task.text} (P${task.priority}) - ${task.dueDate}
          <button class="delete-btn" onclick="deleteTask('${task.id}')">Delete</button>
        `;
        taskList.appendChild(li);
      });

      renderCalendar(tasks);
    }

    function renderCalendar(tasks) {
      if (calendar) calendar.destroy();

      calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        height: 500,
        events: tasks.map(task => ({
          title: task.text,
          date: task.dueDate,
          color: getPriorityColor(task.priority)
        }))
      });

      calendar.render();
    }

    function getPriorityColor(priority) {
      const colors = {
        1: '#ff4c4c',
        2: '#ff924c',
        3: '#ffcc4c',
        4: '#94ff4c',
        5: '#4cff4c'
      };
      return colors[priority] || '#ffffff';
    }

    function switchTab(tab) {
      document.getElementById('list-view').style.display = tab === 'list' ? 'block' : 'none';
      document.getElementById('calendar-view').style.display = tab === 'calendar' ? 'block' : 'none';

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    }

    window.addTask = addTask;
    window.deleteTask = deleteTask;
    window.switchTab = switchTab;
    window.signIn = signIn;
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #333;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      width: 420px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    input[type="text"], select, input[type="date"] {
      width: calc(100% - 22px);
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background-color: #444;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .priority-p1 { border-left: 5px solid #ff4c4c; }
    .priority-p2 { border-left: 5px solid #ff924c; }
    .priority-p3 { border-left: 5px solid #ffcc4c; }
    .priority-p4 { border-left: 5px solid #94ff4c; }
    .priority-p5 { border-left: 5px solid #4cff4c; }

    .delete-btn {
      background-color: #ff4c4c;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background-color: #b30000;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .tab-btn {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin: 0 5px;
      border-radius: 5px 5px 0 0;
    }

    .tab-btn.active {
      background-color: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do Application</h1>
    <button onclick="signIn()">Sign In with Google</button>

    <!-- Zakładki -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list')">Lista</button>
      <button class="tab-btn" onclick="switchTab('calendar')">Kalendarz</button>
    </div>

    <!-- Widok listy -->
    <div id="list-view">
      <input type="text" id="taskInput" placeholder="Enter your task" autofocus>
      <select id="prioritySelect">
        <option value="1">P1 (Highest Priority)</option>
        <option value="2">P2</option>
        <option value="3">P3</option>
        <option value="4">P4</option>
        <option value="5">P5 (Lowest Priority)</option>
      </select>
      <input type="date" id="taskDate">
      <button onclick="addTask()">Add Task</button>
      <ul id="taskList"></ul>
    </div>

    <!-- Widok kalendarza -->
    <div id="calendar-view" style="display: none;">
      <div id="calendar"></div>
    </div>
  </div>
</body>
</html>
